            <!-- FOOTER -->
            <div style="border-top:1px solid #e5e7eb;padding-top:14px;display:flex;justify-content:space-between;font-size:10px;color:#9ca3af;">
              <div>Generated by GitHub Actions · Run ID: {d.get("run_id","-")}</div>
              <div>API Stress Test Report · {fmt_ts(d.get("timestamp",""))}</div>
            </div>

          </div>
          </body>
          </html>'''

          with open('report.html', 'w') as f:
              f.write(html)

          HTML(filename='report.html').write_pdf('stress-test-report.pdf')
          print("✅ PDF report generated: stress-test-report.pdf")
          PYEOF

      - name: 📊 Upload hasil sebagai artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-test-results-${{ github.run_id }}
          path: |
            summary.json
            k6_output.txt
            stress-test-report.pdf
          retention-days: 30

      - name: 📤 Kirim hasil ke Google Sheet
        if: always()
        env:
          SHEET_WEBHOOK_URL: ${{ secrets.GOOGLE_SHEET_WEBHOOK_URL }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - << 'PYEOF'
          import json, os, urllib.request

          with open('summary.json', 'r') as f:
            data = json.load(f)

          data['run_id']  = os.environ['RUN_ID']
          data['run_url'] = os.environ['RUN_URL']

          payload = json.dumps(data).encode('utf-8')
          webhook = os.environ['SHEET_WEBHOOK_URL']

          req = urllib.request.Request(
            webhook,
            data=payload,
            headers={'Content-Type': 'application/json'},
            method='POST'
          )
          with urllib.request.urlopen(req) as resp:
            print(f"Sheet webhook response: {resp.status}")
          PYEOF

      - name: ✅ Print Summary
        if: always()
        run: |
          echo "=============================="
          echo "  STRESS TEST SUMMARY"
          echo "=============================="
          python3 -m json.tool summary.json || cat summary.json
