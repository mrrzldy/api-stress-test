                </tr>
              </tbody>
            </table>
            </div>

            <!-- ERROR BREAKDOWN -->
            {section_title("Error Breakdown")}
            <table style="border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;">
              <thead><tr style="background:#f3f4f6;">
                <th style="padding:9px 14px;text-align:left;font-size:11px;color:#374151;">Error Type</th>
