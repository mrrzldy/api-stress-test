            <table style="border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;margin-bottom:12px;">
              <thead><tr style="background:#f3f4f6;">
                <th style="padding:9px 14px;text-align:left;font-size:11px;color:#374151;">Resource</th>
                <th style="padding:9px 14px;text-align:right;font-size:11px;color:#374151;">Kapasitas</th>
                <th style="padding:9px 14px;text-align:right;font-size:11px;color:#374151;">Est. Digunakan</th>
                <th style="padding:9px 14px;text-align:right;font-size:11px;color:#374151;">Utilisasi</th>
                <th style="padding:9px 14px;text-align:right;font-size:11px;color:#374151;">Status</th>
              </tr></thead>
              <tbody>
                <tr style="border-bottom:1px solid #f3f4f6;">
                  <td style="padding:9px 14px;font-size:12px;">Tomcat Threads (per pod)</td>
                  <td style="padding:9px 14px;font-size:12px;text-align:right;color:#6b7280;">{tomcat_max} threads</td>
                  <td style="padding:9px 14px;font-size:12px;text-align:right;font-weight:600;">{little_l} threads</td>
                  <td style="padding:9px 14px;font-size:12px;text-align:right;">{thread_util_pct}%</td>
                  <td style="padding:9px 14px;text-align:right;">{'<span style="color:#b91c1c;font-weight:600;">✗ KRITIS</span>' if thread_util_pct >= 90 else '<span style="color:#b45309;font-weight:600;">⚠ TINGGI</span>' if thread_util_pct >= 60 else '<span style="color:#1a7a4a;font-weight:600;">✓ AMAN</span>'}</td>
                </tr>
                <tr style="border-bottom:1px solid #f3f4f6;">
                  <td style="padding:9px 14px;font-size:12px;">HikariCP DB Connections (2 pods)</td>
