name: 🔥 API Stress Test

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target API URL (dev environment)'
        required: true
        default: 'https://your-dev-api.com/endpoint'
      virtual_users:
        description: 'Jumlah concurrent users (VU)'
        required: true
        default: '100'
      duration:
        description: 'Durasi stress test (contoh: 1m, 2m, 30s)'
        required: true
        default: '1m'
      ramp_duration:
        description: 'Durasi ramp up/down (contoh: 30s, 1m)'
        required: true
        default: '30s'
      notify_sheet:
        description: 'Kirim hasil ke Google Sheet? (true/false)'
        required: true
        default: 'true'

  repository_dispatch:
    types: [run-stress-test]

jobs:
  stress-test:
    name: Run k6 Stress Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🛠️ Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6 -y

      - name: 🔧 Set parameters
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "TARGET_URL=${{ github.event.client_payload.target_url }}" >> $GITHUB_ENV
            echo "VIRTUAL_USERS=${{ github.event.client_payload.virtual_users }}" >> $GITHUB_ENV
            echo "DURATION=${{ github.event.client_payload.duration }}" >> $GITHUB_ENV
            echo "RAMP_DURATION=${{ github.event.client_payload.ramp_duration }}" >> $GITHUB_ENV
            echo "NOTIFY_SHEET=${{ github.event.client_payload.notify_sheet }}" >> $GITHUB_ENV
          else
            echo "TARGET_URL=${{ github.event.inputs.target_url }}" >> $GITHUB_ENV
            echo "VIRTUAL_USERS=${{ github.event.inputs.virtual_users }}" >> $GITHUB_ENV
            echo "DURATION=${{ github.event.inputs.duration }}" >> $GITHUB_ENV
            echo "RAMP_DURATION=${{ github.event.inputs.ramp_duration }}" >> $GITHUB_ENV
            echo "NOTIFY_SHEET=${{ github.event.inputs.notify_sheet }}" >> $GITHUB_ENV
          fi

      - name: 🚀 Run k6 Stress Test
        env:
          TARGET_URL: ${{ env.TARGET_URL }}
          BEARER_TOKEN: ${{ secrets.DEV_BEARER_TOKEN }}
          VIRTUAL_USERS: ${{ env.VIRTUAL_USERS }}
          DURATION: ${{ env.DURATION }}
          RAMP_DURATION: ${{ env.RAMP_DURATION }}
        run: |
          k6 run \
            --env TARGET_URL="$TARGET_URL" \
            --env BEARER_TOKEN="$BEARER_TOKEN" \
            --env VIRTUAL_USERS="$VIRTUAL_USERS" \
            --env DURATION="$DURATION" \
            --env RAMP_DURATION="$RAMP_DURATION" \
            k6-script.js 2>&1 | tee k6_output.txt || true

          if [ ! -f summary.json ] || [ ! -s summary.json ]; then
            echo "⚠️ summary.json kosong, coba extract dari log..."
            grep 'K6_SUMMARY_JSON=' k6_output.txt \
              | tail -1 \
              | sed 's/.*K6_SUMMARY_JSON=//' > summary.json || true
          fi

          if [ ! -s summary.json ]; then
            echo '{"status":"FAIL","fail_reasons":"k6 did not produce summary","target_url":"'$TARGET_URL'","virtual_users":"'$VIRTUAL_USERS'","duration":"'$DURATION'","total_requests":0,"req_per_second":"0","success_count":0,"fail_count":0,"timeout_count":0,"error_4xx_count":0,"error_5xx_count":0,"error_rate_pct":"100","timeout_rate_pct":"0","avg_response_ms":"0","p95_response_ms":"0","p99_response_ms":"0","min_response_ms":"0","max_response_ms":"0","timestamp":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' > summary.json
          fi

          echo "=== summary.json ==="
          cat summary.json

      - name: 📄 Generate PDF Report
        if: always()
        env:
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          pip install weasyprint --quiet
          python3 - << 'PYEOF'
          import json, os
          from datetime import datetime, timezone
          from weasyprint import HTML

          with open('summary.json', 'r') as f:
              d = json.load(f)

          d['run_id']  = os.environ.get('RUN_ID', '-')
          d['run_url'] = os.environ.get('RUN_URL', '-')

          # ── helpers ──────────────────────────────────────────────
          def fmt_ts(ts):
              try:
                  dt = datetime.fromisoformat(ts.replace('Z', '+00:00'))
                  return dt.strftime('%d %B %Y, %H:%M:%S UTC')
              except:
                  return ts or '-'

          def status_color(s):
              return {'PASS': '#1a7a4a', 'SLOW': '#b45309', 'FAIL': '#b91c1c'}.get(s, '#374151')

          def status_bg(s):
              return {'PASS': '#d1fae5', 'SLOW': '#fef3c7', 'FAIL': '#fee2e2'}.get(s, '#f3f4f6')

          def status_badge(s):
              icons = {'PASS': '✓', 'SLOW': '⚠', 'FAIL': '✗'}
              icon  = icons.get(s, '?')
              return f'<span style="background:{status_bg(s)};color:{status_color(s)};padding:6px 18px;border-radius:20px;font-weight:700;font-size:15px;">{icon} {s}</span>'

          def metric_card(label, value, unit='', note=''):
              note_html = f'<div style="font-size:10px;color:#6b7280;margin-top:2px;">{note}</div>' if note else ''
              return f'''
              <div style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:14px 18px;text-align:center;">
                <div style="font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;">{label}</div>
                <div style="font-size:22px;font-weight:700;color:#111827;">{value}<span style="font-size:13px;color:#6b7280;margin-left:3px;">{unit}</span></div>
                {note_html}
              </div>'''

          def section_title(title):
              return f'<h2 style="font-size:14px;font-weight:700;color:#111827;border-left:4px solid #2563eb;padding-left:10px;margin:28px 0 14px;">{title}</h2>'

          def threshold_status(value, threshold, mode='lt'):
              ok = value < threshold if mode == 'lt' else value > threshold
              if ok:
                  return '<span style="color:#1a7a4a;font-weight:600;">✓ OK</span>'
              else:
                  return '<span style="color:#b91c1c;font-weight:600;">✗ FAIL</span>'

          def slow_or_fail(value, threshold):
              if value < threshold:
                  return '<span style="color:#1a7a4a;font-weight:600;">✓ OK</span>'
              elif value < threshold * 1.5:
                  return '<span style="color:#b45309;font-weight:600;">⚠ SLOW</span>'
              else:
                  return '<span style="color:#b91c1c;font-weight:600;">✗ FAIL</span>'

          # ── metrics ───────────────────────────────────────────────
          status       = d.get('status', 'FAIL')
          p95          = float(d.get('p95_response_ms', 0))
          p99_raw      = float(d.get('p99_response_ms', 0))
          p99          = p99_raw if p99_raw > 0 else 0
          p99_display  = f'{p99_raw:.0f}' if p99_raw > 0 else 'N/A'
          avg          = float(d.get('avg_response_ms', 0))
          min_ms       = float(d.get('min_response_ms', 0))
          max_ms       = float(d.get('max_response_ms', 0))
          error_pct    = float(d.get('error_rate_pct', 0))
          timeout_pct  = float(d.get('timeout_rate_pct', 0))
          total_req    = int(d.get('total_requests', 0))
          success      = int(d.get('success_count', 0))
          fail_count   = int(d.get('fail_count', 0))
          timeout_cnt  = int(d.get('timeout_count', 0))
          err4xx       = int(d.get('error_4xx_count', 0))
          err5xx       = int(d.get('error_5xx_count', 0))
          vu           = d.get('virtual_users', '-')
          duration     = d.get('duration', '-')
          rps          = d.get('req_per_second', '0')

          # FIX: success rate dihitung dari actual success, bukan dari failed flag
          actual_failed   = timeout_cnt + err4xx + err5xx
          actual_success  = total_req - actual_failed
          success_rate    = round((actual_success / total_req * 100), 2) if total_req > 0 else 0

          # FIX: rate per error type dihitung sendiri
          timeout_rate_pct = round((timeout_cnt / total_req * 100), 2) if total_req > 0 else 0
          err4xx_rate_pct  = round((err4xx / total_req * 100), 2) if total_req > 0 else 0
          err5xx_rate_pct  = round((err5xx / total_req * 100), 2) if total_req > 0 else 0

          # ── resource estimation ───────────────────────────────────
          # Concurrency utilization: Little's Law — L = λ × W
          # L  = avg concurrent requests in system
          # λ  = arrival rate (req/s)
          # W  = avg response time (seconds)
          rps_float        = float(rps)
          avg_sec          = avg / 1000.0
          little_l         = round(rps_float * avg_sec, 1)

          # Thread pool utilization estimate
          # Spring Boot Tomcat default max threads = 200
          # Each request holds a thread for avg_sec duration
          tomcat_max        = 200
          thread_util_pct   = round((little_l / tomcat_max * 100), 1)

          # HikariCP connection estimate
          # Default maximumPoolSize = 10 per pod, min 2 pods = 20 total
          hikari_pool_total = 10 * 2  # per pod × min replicas
          # DB connections needed ≈ concurrent non-timeout requests
          non_timeout_rps   = rps_float * (1 - timeout_cnt / total_req) if total_req > 0 else rps_float
          db_conn_needed    = round(non_timeout_rps * avg_sec, 1)
          hikari_util_pct   = round((db_conn_needed / hikari_pool_total * 100), 1)

          # CPU estimation: 2000m per pod × 2 pods = 4000m total
          # Rough heuristic: each active request ≈ 5-20% of 1 core
          # We use Little's law result as proxy for load
          cpu_total_m       = 2000 * 2
          # If avg > 5s, likely IO-bound; use conservative 5m CPU per req
          cpu_per_req_m     = 5 if avg > 5000 else 15
          cpu_used_m        = round(little_l * cpu_per_req_m, 0)
          cpu_util_pct      = round((cpu_used_m / cpu_total_m * 100), 1)

          # Bottleneck detection
          bottleneck = 'Tidak terdeteksi'
          if hikari_util_pct >= 80:
              bottleneck = 'HikariCP Connection Pool (database connections exhausted)'
          elif thread_util_pct >= 80:
              bottleneck = 'Tomcat Thread Pool (request threads exhausted)'
          elif cpu_util_pct >= 80:
              bottleneck = 'CPU Resource (compute-bound)'
          elif timeout_rate_pct >= 20:
              bottleneck = 'External/DB Response Time (downstream latency)'

          # ── kesimpulan & rekomendasi ──────────────────────────────
          conclusions = []
          recommends  = []

          if status == 'PASS':
              conclusions.append(f'API merespons dengan baik di bawah beban <b>{vu} concurrent users</b> selama <b>{duration}</b>.')
              conclusions.append(f'Seluruh <b>{total_req:,} request</b> berhasil dengan success rate <b>{success_rate}%</b>.')
              if p95 < 1000:
                  conclusions.append(f'Response time sangat baik — 95% request selesai dalam <b>{p95:.0f}ms</b>.')
              else:
                  conclusions.append(f'Response time dalam batas aman — P95 <b>{p95:.0f}ms</b> masih di bawah threshold 2000ms.')
              recommends.append('API siap untuk beban normal. Pertimbangkan menaikkan VU secara bertahap untuk mengetahui batas kapasitas.')
              recommends.append('Dengan konfigurasi <b>minReplicas: 2 / maxReplicas: 5</b>, pastikan HPA (Horizontal Pod Autoscaler) aktif dan responsif terhadap kenaikan load.')
              recommends.append('Lakukan stress test rutin untuk memastikan performa tidak degradasi seiring penambahan fitur.')

          elif status == 'SLOW':
              conclusions.append(f'API berhasil melayani semua request dengan success rate <b>{success_rate}%</b>, namun response time melebihi standar.')
              conclusions.append(f'P95 response time mencapai <b>{p95:.0f}ms</b> — artinya 1 dari 20 request membutuhkan lebih dari {p95:.0f}ms untuk selesai.')
              conclusions.append(f'Rata-rata response time <b>{avg:.0f}ms</b> dengan <b>{vu} concurrent users</b> mengindikasikan adanya bottleneck di sisi server atau database.')
              conclusions.append(f'Dengan limit CPU <b>2000m (2 core)</b> dan memory <b>2048Mi</b> per pod, kemungkinan resource mulai terkuras pada beban ini.')
              recommends.append('Investigasi query database — kemungkinan ada N+1 query atau missing index yang memperlambat response di Spring Boot service.')
              recommends.append('Review apakah HPA sudah melakukan scale-up ke replica tambahan. Dengan maxReplicas: 5, seharusnya ada headroom untuk menangani beban lebih.')
              recommends.append('Pertimbangkan implementasi caching (Redis) untuk mengurangi DB calls pada endpoint burn-inquiry.')
              recommends.append('Monitor JVM heap usage — Spring Boot di Java 17 dengan heap yang mendekati batas 2048Mi dapat menyebabkan GC pause yang signifikan.')
              recommends.append('Cek thread pool size di Spring Boot (server.tomcat.threads.max) — default 200 thread mungkin perlu disesuaikan.')

          else:  # FAIL
              if timeout_cnt > 0:
                  conclusions.append(f'<b>{timeout_cnt} dari {total_req} request ({timeout_rate_pct}%) mengalami timeout</b> — server tidak merespons dalam batas waktu 10 detik.')
              if err5xx > 0:
                  conclusions.append(f'Terdapat <b>{err5xx} server error (5xx)</b> yang mengindikasikan crash atau unhandled exception di aplikasi.')
              if err4xx > 0:
                  conclusions.append(f'Terdapat <b>{err4xx} client error (4xx)</b> — kemungkinan masalah autentikasi atau payload.')
              if p95 >= 2000:
                  conclusions.append(f'P95 response time mencapai <b>{p95:.0f}ms</b> — jauh melewati threshold 2000ms, mengindikasikan server kelelahan di bawah beban <b>{vu} VU</b>.')
              conclusions.append(f'Dengan spesifikasi <b>CPU 2000m dan memory 2048Mi per pod</b> (min 2 replicas), server kemungkinan sudah mencapai batas kapasitas pada <b>{vu} concurrent users</b>.')
              recommends.append('Periksa application log Spring Boot untuk stack trace error — kemungkinan <b>ThreadPoolTaskExecutor exhausted</b> atau <b>DataSource connection pool timeout</b>.')
              recommends.append('Cek apakah HPA sudah scale-up ke maxReplicas: 5 selama test berlangsung. Jika belum, review HPA metrics dan targetCPUUtilizationPercentage.')
              recommends.append('Monitor JVM metrics (heap, GC pause, thread count) menggunakan Actuator + Prometheus saat test berlangsung.')
              recommends.append(f'Turunkan VU ke 20–30 dan uji ulang untuk menemukan batas aman sebelum server mulai timeout.')
              recommends.append(f'Pertimbangkan tuning <b>HikariCP connection pool</b> di Spring Boot — default maximumPoolSize=10 bisa jadi bottleneck di {vu} VU.')
              recommends.append('Jika timeout terjadi sebelum scale-up sempat berjalan, pertimbangkan menaikkan minReplicas dari 2 ke 3 untuk baseline capacity yang lebih tinggi.')

          conclusions_html = ''.join(f'<li>{c}</li>' for c in conclusions)
          recommends_html  = ''.join(f'<li>{r}</li>' for r in recommends)

          # ── error sample ──────────────────────────────────────────
          error_sample_html = ''
          raw_sample = d.get('error_sample', '[]')
          try:
              samples = json.loads(raw_sample) if isinstance(raw_sample, str) else raw_sample
              if isinstance(samples, list) and len(samples) > 0:
                  rows = ''.join(
                      f'<tr><td style="padding:8px 12px;font-size:11px;color:#374151;border-bottom:1px solid #f3f4f6;">{i+1}</td>'
                      f'<td style="padding:8px 12px;font-size:11px;border-bottom:1px solid #f3f4f6;"><span style="background:#fee2e2;color:#b91c1c;padding:2px 8px;border-radius:4px;font-weight:600;">{s["status"]}</span></td>'
                      f'<td style="padding:8px 12px;font-size:11px;color:#374151;border-bottom:1px solid #f3f4f6;word-break:break-all;">{s.get("body","(empty)")}</td></tr>'
                      for i, s in enumerate(samples)
                  )
                  error_sample_html = f'''
                  {section_title("Error Samples")}
                  <p style="font-size:11px;color:#6b7280;margin-bottom:10px;">Sample response body dari request yang gagal (maksimal 5 sample).</p>
                  <table style="width:100%;border-collapse:collapse;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;">
                    <thead><tr style="background:#f3f4f6;">
                      <th style="padding:9px 12px;text-align:left;font-size:11px;color:#374151;">#</th>
                      <th style="padding:9px 12px;text-align:left;font-size:11px;color:#374151;">Status</th>
                      <th style="padding:9px 12px;text-align:left;font-size:11px;color:#374151;">Response Body</th>
                    </tr></thead>
                    <tbody>{rows}</tbody>
                  </table>'''
          except:
              pass

          # ── HTML ──────────────────────────────────────────────────
          html = f'''<!DOCTYPE html>
          <html lang="id">
          <head>
            <meta charset="UTF-8"/>
            <style>
              * {{ box-sizing: border-box; margin: 0; padding: 0; }}
              body {{ font-family: Arial, sans-serif; color: #111827; background: white; font-size: 12px; line-height: 1.6; }}
              .page {{ padding: 40px 48px; max-width: 900px; margin: 0 auto; }}
              .metric-grid {{ display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 6px; }}
              .metric-grid-3 {{ display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }}
              table {{ width: 100%; border-collapse: collapse; }}
              ul {{ list-style: none; padding-left: 0; margin: 0; }}
              ul li {{ padding-left: 14px; text-indent: -14px; margin-bottom: 8px; }}
              ul li::before {{ content: "• "; }}
              @page {{ margin: 0; size: A4; }}
            </style>
          </head>
          <body>
          <div class="page">

            <!-- COVER HEADER -->
            <div style="background:linear-gradient(135deg,#1e3a8a 0%,#2563eb 100%);border-radius:12px;padding:36px 40px;margin-bottom:28px;color:white;">
              <div style="font-size:11px;text-transform:uppercase;letter-spacing:1.5px;opacity:.8;margin-bottom:8px;">Performance Test Report</div>
              <div style="font-size:26px;font-weight:700;margin-bottom:4px;">API Stress Test</div>
              <div style="font-size:13px;opacity:.85;margin-bottom:20px;">{d.get("target_url", "-")}</div>
              <div style="display:flex;gap:32px;font-size:12px;opacity:.9;">
                <div><span style="opacity:.7;">Tanggal</span><br/><b>{fmt_ts(d.get("timestamp",""))}</b></div>
                <div><span style="opacity:.7;">Run ID</span><br/><b>{d.get("run_id","-")}</b></div>
                <div><span style="opacity:.7;">Virtual Users</span><br/><b>{vu} VU</b></div>
                <div><span style="opacity:.7;">Durasi</span><br/><b>{duration}</b></div>
              </div>
            </div>

            <!-- STATUS BANNER -->
            <div style="background:{status_bg(status)};border:1.5px solid {status_color(status)}30;border-radius:10px;padding:18px 24px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;">
              <div>
                <div style="font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;">Overall Status</div>
                {status_badge(status)}
              </div>
              <div style="text-align:right;font-size:12px;color:#374151;max-width:60%;">
                <div style="margin-bottom:4px;font-weight:600;">Fail Reasons:</div>
                <div style="color:{status_color(status)};font-size:11px;">{d.get("fail_reasons", "-")}</div>
              </div>
            </div>

            <!-- SERVER SPEC -->
            {section_title("Server Specification")}
            <div style="background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:16px 20px;margin-bottom:6px;">
              <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;">
                <div>
                  <div style="font-size:10px;color:#0369a1;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;font-weight:600;">Environment</div>
                  <div style="font-size:13px;font-weight:700;color:#0c4a6e;">DEV</div>
                </div>
                <div>
                  <div style="font-size:10px;color:#0369a1;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;font-weight:600;">Runtime</div>
                  <div style="font-size:13px;font-weight:700;color:#0c4a6e;">Java 17 · Spring Boot 2.7</div>
                </div>
                <div>
                  <div style="font-size:10px;color:#0369a1;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;font-weight:600;">Replicas</div>
                  <div style="font-size:13px;font-weight:700;color:#0c4a6e;">min 2 · max 5</div>
                </div>
              </div>
              <div style="border-top:1px solid #bae6fd;margin-top:14px;padding-top:14px;display:grid;grid-template-columns:repeat(4,1fr);gap:16px;">
                <div>
                  <div style="font-size:10px;color:#0369a1;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:600;">CPU Request</div>
                  <div style="font-size:13px;font-weight:700;color:#0c4a6e;">2000m</div>
                </div>
                <div>
                  <div style="font-size:10px;color:#0369a1;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:600;">CPU Limit</div>
                  <div style="font-size:13px;font-weight:700;color:#0c4a6e;">2000m</div>
                </div>
                <div>
                  <div style="font-size:10px;color:#0369a1;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:600;">Memory Request</div>
                  <div style="font-size:13px;font-weight:700;color:#0c4a6e;">2048Mi</div>
                </div>
                <div>
                  <div style="font-size:10px;color:#0369a1;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:600;">Memory Limit</div>
                  <div style="font-size:13px;font-weight:700;color:#0c4a6e;">2048Mi</div>
                </div>
              </div>
            </div>

            <!-- EXECUTIVE SUMMARY -->
            {section_title("Executive Summary")}
            <div class="metric-grid">
              {metric_card("Total Request", f"{total_req:,}")}
              {metric_card("Success Rate", f"{success_rate}", "%", f"{actual_success:,} sukses · {actual_failed:,} gagal")}
              {metric_card("Req / Second", rps)}
              {metric_card("Concurrent Users", vu, "VU")}
            </div>

            <!-- RESPONSE TIME -->
            {section_title("Response Time")}
            <div class="metric-grid">
              {metric_card("Average", f"{avg:.0f}", "ms", "Rata-rata semua request")}
              {metric_card("P95", f"{p95:.0f}", "ms", "95% request di bawah nilai ini")}
              {metric_card("P99", p99_display, "ms", "99% request di bawah nilai ini")}
              {metric_card("Max", f"{max_ms:.0f}", "ms", "Request terlama")}
            </div>
            <div style="margin-top:12px;">
            <table style="border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;">
              <thead><tr style="background:#f3f4f6;">
                <th style="padding:9px 14px;text-align:left;font-size:11px;color:#374151;">Metric</th>
                <th style="padding:9px 14px;text-align:right;font-size:11px;color:#374151;">Value</th>
                <th style="padding:9px 14px;text-align:right;font-size:11px;color:#374151;">Threshold</th>
                <th style="padding:9px 14px;text-align:right;font-size:11px;color:#374151;">Status</th>
              </tr></thead>
              <tbody>
                <tr style="border-bottom:1px solid #f3f4f6;">
                  <td style="padding:9px 14px;font-size:12px;">Min Response Time</td>
