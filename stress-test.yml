name: 🔥 API Stress Test

on:
  # Manual trigger dari GitHub UI — tim tinggal klik "Run workflow" & isi form
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target API URL (dev environment)'
        required: true
        default: 'https://your-dev-api.com/endpoint'
      virtual_users:
        description: 'Jumlah concurrent users (VU)'
        required: true
        default: '100'
      duration:
        description: 'Durasi stress test (contoh: 1m, 2m, 30s)'
        required: true
        default: '1m'
      ramp_duration:
        description: 'Durasi ramp up/down (contoh: 30s, 1m)'
        required: true
        default: '30s'
      notify_sheet:
        description: 'Kirim hasil ke Google Sheet? (true/false)'
        required: true
        default: 'true'

  # Bisa juga di-trigger via API (dari Apps Script Google Sheet)
  repository_dispatch:
    types: [run-stress-test]

jobs:
  stress-test:
    name: Run k6 Stress Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🛠️ Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6 -y

      - name: 🔧 Set parameters
        id: params
        run: |
          # Support trigger dari workflow_dispatch maupun repository_dispatch (Apps Script)
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "TARGET_URL=${{ github.event.client_payload.target_url }}" >> $GITHUB_ENV
            echo "VIRTUAL_USERS=${{ github.event.client_payload.virtual_users }}" >> $GITHUB_ENV
            echo "DURATION=${{ github.event.client_payload.duration }}" >> $GITHUB_ENV
            echo "RAMP_DURATION=${{ github.event.client_payload.ramp_duration }}" >> $GITHUB_ENV
            echo "NOTIFY_SHEET=${{ github.event.client_payload.notify_sheet }}" >> $GITHUB_ENV
          else
            echo "TARGET_URL=${{ github.event.inputs.target_url }}" >> $GITHUB_ENV
            echo "VIRTUAL_USERS=${{ github.event.inputs.virtual_users }}" >> $GITHUB_ENV
            echo "DURATION=${{ github.event.inputs.duration }}" >> $GITHUB_ENV
            echo "RAMP_DURATION=${{ github.event.inputs.ramp_duration }}" >> $GITHUB_ENV
            echo "NOTIFY_SHEET=${{ github.event.inputs.notify_sheet }}" >> $GITHUB_ENV
          fi

      - name: 🚀 Run k6 Stress Test
        id: k6_run
        env:
          TARGET_URL: ${{ env.TARGET_URL }}
          BEARER_TOKEN: ${{ secrets.DEV_BEARER_TOKEN }}
          VIRTUAL_USERS: ${{ env.VIRTUAL_USERS }}
          DURATION: ${{ env.DURATION }}
          RAMP_DURATION: ${{ env.RAMP_DURATION }}
        run: |
          # Jalankan k6, capture output
          k6 run \
            --env TARGET_URL="$TARGET_URL" \
            --env BEARER_TOKEN="$BEARER_TOKEN" \
            --env VIRTUAL_USERS="$VIRTUAL_USERS" \
            --env DURATION="$DURATION" \
            --env RAMP_DURATION="$RAMP_DURATION" \
            k6-script.js 2>&1 | tee k6_output.txt

          # Extract JSON summary dari output
          grep 'K6_SUMMARY_JSON=' k6_output.txt | sed 's/K6_SUMMARY_JSON=//' > summary.json || echo '{}' > summary.json
          echo "summary=$(cat summary.json)" >> $GITHUB_OUTPUT

      - name: 📊 Upload hasil sebagai artifact
        uses: actions/upload-artifact@v4
        with:
          name: stress-test-results-${{ github.run_id }}
          path: |
            summary.json
            k6_output.txt
          retention-days: 30

      - name: 📤 Kirim hasil ke Google Sheet
        if: env.NOTIFY_SHEET == 'true'
        env:
          SHEET_WEBHOOK_URL: ${{ secrets.GOOGLE_SHEET_WEBHOOK_URL }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          SUMMARY=$(cat summary.json)

          # Inject run_id dan run_url ke summary
          PAYLOAD=$(echo "$SUMMARY" | \
            python3 -c "
          import json, sys, os
          d = json.load(sys.stdin)
          d['run_id'] = os.environ['RUN_ID']
          d['run_url'] = os.environ['RUN_URL']
          print(json.dumps(d))
          ")

          curl -s -X POST "$SHEET_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      - name: ✅ Print Summary
        run: |
          echo "=============================="
          echo "  STRESS TEST SUMMARY"
          echo "=============================="
          cat summary.json | python3 -m json.tool || cat summary.json
