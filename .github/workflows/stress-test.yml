                <tr style="border-bottom:1px solid #f3f4f6;">
                  <td style="padding:9px 14px;font-size:12px;">Timeout (no response)</td>
                  <td style="padding:9px 14px;font-size:12px;text-align:right;font-weight:600;">{timeout_cnt}</td>
                  <td style="padding:9px 14px;font-size:12px;text-align:right;">{timeout_rate_pct}%</td>
                  <td style="padding:9px 14px;font-size:12px;text-align:right;color:#6b7280;">&lt; 2%</td>
                  <td style="padding:9px 14px;text-align:right;">{threshold_status(timeout_rate_pct, 2)}</td>
                </tr>
                <tr style="border-bottom:1px solid #f3f4f6;">
                  <td style="padding:9px 14px;font-size:12px;">4xx Client Error</td>
                  <td style="padding:9px 14px;font-size:12px;text-align:right;font-weight:600;">{err4xx}</td>
                  <td style="padding:9px 14px;font-size:12px;text-align:right;">{err4xx_rate_pct}%</td>
                  <td style="padding:9px 14px;font-size:12px;text-align:right;color:#6b7280;">&lt; 5%</td>
                  <td style="padding:9px 14px;text-align:right;">{threshold_status(err4xx_rate_pct, 5)}</td>
                </tr>
                <tr>
                  <td style="padding:9px 14px;font-size:12px;">5xx Server Error</td>
                  <td style="padding:9px 14px;font-size:12px;text-align:right;font-weight:600;">{err5xx}</td>
                  <td style="padding:9px 14px;font-size:12px;text-align:right;">{err5xx_rate_pct}%</td>
                  <td style="padding:9px 14px;font-size:12px;text-align:right;color:#6b7280;">&lt; 2%</td>
                  <td style="padding:9px 14px;text-align:right;">{threshold_status(err5xx_rate_pct, 2)}</td>
                </tr>
              </tbody>
            </table>

            {error_sample_html}

            <!-- PAGE BREAK -->
            <div style="page-break-before:always;"></div>

            <!-- PAGE BREAK -->
            <div style="page-break-before:always;"></div>

            <!-- RESOURCE ESTIMATION -->
            {section_title("Resource Estimation")}
            <p style="font-size:11px;color:#6b7280;margin-bottom:12px;">
              Estimasi penggunaan resource berdasarkan <b>Little's Law</b> (L = λ × W) dan spesifikasi server.
              Nilai ini adalah perkiraan — bukan hasil monitoring aktual.
            </p>
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;">
              {metric_card("Concurrent Req", f"{little_l}", "", "Rata-rata request aktif di server (Little's Law)")}
              {metric_card("Thread Pool", f"{thread_util_pct}", "%", f"Estimasi utilisasi Tomcat ({tomcat_max} threads)")}
              {metric_card("DB Conn Pool", f"{hikari_util_pct}", "%", f"Estimasi utilisasi HikariCP ({hikari_pool_total} koneksi)")}
              {metric_card("CPU Est.", f"{cpu_util_pct}", "%", f"Estimasi utilisasi CPU ({cpu_total_m}m total)")}
