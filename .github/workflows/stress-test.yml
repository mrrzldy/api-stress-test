                  <td style="padding:9px 14px;font-size:12px;text-align:right;">{cpu_util_pct}%</td>
                  <td style="padding:9px 14px;text-align:right;">{'<span style="color:#b91c1c;font-weight:600;">✗ KRITIS</span>' if cpu_util_pct >= 90 else '<span style="color:#b45309;font-weight:600;">⚠ TINGGI</span>' if cpu_util_pct >= 60 else '<span style="color:#1a7a4a;font-weight:600;">✓ AMAN</span>'}</td>
                </tr>
              </tbody>
            </table>
            <div style="background:#fefce8;border:1px solid #fde047;border-radius:8px;padding:12px 16px;font-size:11px;color:#713f12;">
              <b>⚡ Estimated Bottleneck:</b> {bottleneck}
