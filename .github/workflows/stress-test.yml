name: 🔥 API Stress Test

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: Target API URL (dev environment)
        required: true
        default: https://your-dev-api.com/endpoint
      virtual_users:
        description: Jumlah concurrent users (VU)
        required: true
        default: "100"
      duration:
        description: Durasi stress test (1m, 30s, dll)
        required: true
        default: "1m"
      ramp_duration:
        description: Durasi ramp up/down
        required: true
        default: "30s"
      notify_sheet:
        description: Kirim ke Google Sheet (true/false)
        required: true
        default: "true"

  repository_dispatch:
    types: [run-stress-test]

jobs:
  stress-test:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🛠️ Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg software-properties-common
          curl -s https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: 🔧 Set parameters
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "TARGET_URL=${{ github.event.client_payload.target_url }}" >> $GITHUB_ENV
            echo "VIRTUAL_USERS=${{ github.event.client_payload.virtual_users }}" >> $GITHUB_ENV
            echo "DURATION=${{ github.event.client_payload.duration }}" >> $GITHUB_ENV
            echo "RAMP_DURATION=${{ github.event.client_payload.ramp_duration }}" >> $GITHUB_ENV
            echo "NOTIFY_SHEET=${{ github.event.client_payload.notify_sheet }}" >> $GITHUB_ENV
          else
            echo "TARGET_URL=${{ github.event.inputs.target_url }}" >> $GITHUB_ENV
            echo "VIRTUAL_USERS=${{ github.event.inputs.virtual_users }}" >> $GITHUB_ENV
            echo "DURATION=${{ github.event.inputs.duration }}" >> $GITHUB_ENV
            echo "RAMP_DURATION=${{ github.event.inputs.ramp_duration }}" >> $GITHUB_ENV
            echo "NOTIFY_SHEET=${{ github.event.inputs.notify_sheet }}" >> $GITHUB_ENV
          fi

      - name: 🚀 Run k6 Stress Test
        env:
          TARGET_URL: ${{ env.TARGET_URL }}
          BEARER_TOKEN: ${{ secrets.DEV_BEARER_TOKEN }}
        run: |
          k6 run \
            --env TARGET_URL="$TARGET_URL" \
            --env BEARER_TOKEN="$BEARER_TOKEN" \
            --env VIRTUAL_USERS="${{ env.VIRTUAL_USERS }}" \
            --env DURATION="${{ env.DURATION }}" \
            --env RAMP_DURATION="${{ env.RAMP_DURATION }}" \
            k6-script.js 2>&1 | tee k6_output.txt || true

          if [ ! -s summary.json ]; then
            echo '{"status":"FAIL","fail_reasons":"No summary generated"}' > summary.json
          fi

      - name: 📄 Generate PDF Report
        if: always()
        env:
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          pip install weasyprint --quiet

          python3 - << 'PYEOF'
          import json, os
          from weasyprint import HTML

          with open('summary.json') as f:
              d = json.load(f)

          html = f"""
          <html>
          <body style='font-family: Arial'>
            <h1>API Stress Test Report</h1>
            <p><b>Target:</b> {d.get("target_url","-")}</p>
            <p><b>Status:</b> {d.get("status","-")}</p>
            <p><b>Run ID:</b> {os.environ.get("RUN_ID")}</p>
            <p><b>Run URL:</b> {os.environ.get("RUN_URL")}</p>
            <hr/>
            <pre>{json.dumps(d, indent=2)}</pre>
          </body>
          </html>
          """

          with open("report.html","w") as f:
              f.write(html)

          HTML("report.html").write_pdf("stress-test-report.pdf")
          print("PDF generated")
          PYEOF

      - name: 📊 Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-test-${{ github.run_id }}
          path: |
            summary.json
            k6_output.txt
            stress-test-report.pdf

      - name: 📤 Send to Google Sheet
        if: always()
        env:
          WEBHOOK: ${{ secrets.GOOGLE_SHEET_WEBHOOK_URL }}
        run: |
          python3 - << 'PYEOF'
          import json, os, urllib.request

          with open("summary.json") as f:
              data = json.load(f)

          req = urllib.request.Request(
              os.environ["WEBHOOK"],
              data=json.dumps(data).encode(),
              headers={"Content-Type": "application/json"}
          )

          urllib.request.urlopen(req)
          print("Sent to Google Sheet")
          PYEOF

      - name: ✅ Print Summary
        if: always()
        run: |
          cat summary.json
