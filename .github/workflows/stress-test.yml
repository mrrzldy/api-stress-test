                  <td style="padding:9px 14px;font-size:12px;text-align:right;font-weight:600;">{db_conn_needed} koneksi</td>
                  <td style="padding:9px 14px;font-size:12px;text-align:right;">{hikari_util_pct}%</td>
                  <td style="padding:9px 14px;text-align:right;">{'<span style="color:#b91c1c;font-weight:600;">✗ KRITIS</span>' if hikari_util_pct >= 90 else '<span style="color:#b45309;font-weight:600;">⚠ TINGGI</span>' if hikari_util_pct >= 60 else '<span style="color:#1a7a4a;font-weight:600;">✓ AMAN</span>'}</td>
                </tr>
                <tr>
                  <td style="padding:9px 14px;font-size:12px;">CPU (2 pods × 2000m)</td>
